name: Frontend Tests

on:
  push:
    branches: [ main, frontend-testing-ci ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest

      - name: Run frontend page tests
        run: pytest tests/test_frontend_pages.py -v