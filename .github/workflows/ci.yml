name: CI

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-python:
    name: Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --no-cache-dir -r requirements.txt

      - name: Syntax check (compileall)
        run: python -m compileall -q .

      - name: Import FastAPI app
        run: python -c "from main import app; assert app.title"

  docker-compose:
    name: Docker Compose (build + smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend-python]

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start stack and wait for health
        run: docker compose up -d --wait

      - name: Smoke test API
        run: curl -fsS http://127.0.0.1:5001/api/health | grep -q status

      - name: Smoke test static site
        run: curl -fsS http://127.0.0.1:8000/login.html | grep -qi html

      - name: Stop stack
        if: always()
        run: docker compose down -v

  
    genai-tests:
    name: GenAI Chatbot Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-python]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install pytest

      - name: Debug environment (IMPORTANT)
        run: |
          python --version
          python -m pip show pytest
          pwd
          ls
          ls ../tests

      - name: Run GenAI tests
        env:
          TEST_MODE: "true"
        run: |
          python -m pytest -v ../tests
