name: HTML Content Check

on:
  push:
    branches: [ frontend-testing-ci ]

jobs:
  html-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pytest
        run: pip install pytest

      - name: Run content tests
        run: pytest tests/test_frontend_pages.py::test_dashboard_content -v