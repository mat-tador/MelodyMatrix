# Melody Matrix — consistent local / CI environment
# Usage: docker compose up --build
#   Frontend: http://localhost:8000/login.html
#   API:       http://localhost:5001/api/health
#
# Create frontend/public/config.js locally (not baked into image by default).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
