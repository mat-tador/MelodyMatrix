version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
     
      - OLLAMA_URL=http://ollama:11434/api/generate
      - TEST_MODE=false
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

 
  ollama:
    image: ollama/ollama
    container_name: melody-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: