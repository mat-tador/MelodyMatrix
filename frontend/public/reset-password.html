<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody Matrix - Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ height:100vh; display:flex; justify-content:center; align-items:center; background:#f7f4ef; color:#111; overflow:hidden; }
.music-notes span{ position:absolute; bottom:-100px; font-size:28px; animation:float 12s linear infinite; opacity:0.7; }
.music-notes span:nth-child(1){ left:8%; color:#f4a261; animation-delay:0s; }
.music-notes span:nth-child(2){ left:20%; color:#e76f51; animation-delay:2s; }
.music-notes span:nth-child(3){ left:35%; color:#2a9d8f; animation-delay:4s; }
.music-notes span:nth-child(4){ left:50%; color:#6a4c93; animation-delay:1s; }
.music-notes span:nth-child(5){ left:65%; color:#e9c46a; animation-delay:3s; }
.music-notes span:nth-child(6){ left:80%; color:#8ecae6; animation-delay:5s; }
.music-notes span:nth-child(7){ left:92%; color:#ffafcc; animation-delay:6s; }
@keyframes float{ 0%{ transform:translateY(0) rotate(0deg); opacity:0; } 50%{ opacity:0.8; } 100%{ transform:translateY(-110vh) rotate(360deg); opacity:0; } }
.container{ width:390px; background:white; padding:35px; border-radius:14px; box-shadow:0 10px 35px rgba(0,0,0,0.08); text-align:center; z-index:2; }
.logo{ font-size:26px; font-weight:600; margin-bottom:5px; }
.subtitle{ font-size:14px; color:#555; margin-bottom:22px; }
.step-title{ font-size:14px; font-weight:600; margin-bottom:12px; text-align:left; }
.input-group{ margin-bottom:14px; text-align:left; }
.input-group label{ font-size:13px; margin-bottom:6px; display:block; }
.input-group input{ width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; outline:none; }
.input-group input:focus{ border-color:#444; }
button{ width:100%; padding:12px; border:none; border-radius:8px; background:#111; color:white; font-weight:500; cursor:pointer; transition:0.25s; margin-bottom:10px; }
button:hover{ background:#333; }
.secondary-btn{ background:#6a4c93; }
.secondary-btn:hover{ background:#5a3c83; }
.error-message{ color:#e76f51; font-size:12px; margin-top:8px; display:none; text-align:left; }
.success-message{ color:#2a9d8f; font-size:12px; margin-top:8px; display:none; text-align:left; }
.login{ margin-top:8px; font-size:13px; }
.login a{ color:black; font-weight:500; text-decoration:none; }
.hidden{ display:none; }
</style>
</head>
<body>
<div class="music-notes">
  <span>♪</span><span>♫</span><span>♩</span><span>♪</span><span>♫</span><span>♩</span><span>♬</span>
</div>
<div class="container">
  <div class="logo">Melody Matrix</div>
  <div class="subtitle">Reset Your Password</div>

  <form id="emailStepForm">
    <div class="step-title">Step 1: Enter your registered email</div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter registered email" required>
    </div>
    <button type="submit">Send Recovery Link</button>
  </form>

  <form id="passwordStepForm" class="hidden">
    <div class="step-title">Step 2: Set a new password</div>
    <div class="input-group">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Enter new password" required>
    </div>
    <div class="input-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirmNewPassword" placeholder="Confirm new password" required>
    </div>
    <button type="submit">Update Password</button>
    <button type="button" id="resendRecoveryBtn" class="secondary-btn">Resend Recovery Link</button>
  </form>

  <div class="error-message" id="errorMessage"></div>
  <div class="success-message" id="successMessage"></div>
  <div class="login">Back to <a href="login.html">Login</a></div>
</div>

<script>
window.addEventListener('load', function() {
  const errorMessage = document.getElementById('errorMessage');
  const successMessage = document.getElementById('successMessage');
  const emailStepForm = document.getElementById('emailStepForm');
  const passwordStepForm = document.getElementById('passwordStepForm');
  const resendRecoveryBtn = document.getElementById('resendRecoveryBtn');

  let supabaseClient = null;
  let resetEmail = '';
  let recoverySessionReady = false;

  function showError(message) { successMessage.style.display = 'none'; errorMessage.textContent = message; errorMessage.style.display = 'block'; }
  function showSuccess(message) { errorMessage.style.display = 'none'; successMessage.textContent = message; successMessage.style.display = 'block'; }
  function clearMessages() { errorMessage.style.display = 'none'; successMessage.style.display = 'none'; }
  function showStep(step) {
    emailStepForm.classList.add('hidden');
    passwordStepForm.classList.add('hidden');
    if (step === 'email') emailStepForm.classList.remove('hidden');
    if (step === 'password') passwordStepForm.classList.remove('hidden');
  }
  function hasRecoveryParams() {
    return window.location.search.includes('code=') || window.location.search.includes('type=recovery') || window.location.hash.includes('type=recovery') || window.location.hash.includes('access_token=');
  }

  const hasConfig = typeof CONFIG !== 'undefined' && CONFIG && CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY;
  const hasSupabase = typeof supabase !== 'undefined';
  if (hasConfig && hasSupabase) {
    supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  } else {
    showError('Supabase is not configured. Password reset is unavailable.');
    return;
  }

  emailStepForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearMessages();
    recoverySessionReady = false;
    resetEmail = document.getElementById('email').value.trim();
    if (!resetEmail) {
      showError('Please enter your email first.');
      return;
    }

    try {
      const redirectTo = new URL('reset-password.html', window.location.href).href;
      const { error } = await supabaseClient.auth.resetPasswordForEmail(resetEmail, { redirectTo: redirectTo });
      if (error) throw error;
      showSuccess('If this email is registered, a recovery link has been sent.');
    } catch (error) {
      showError(error?.message || 'Failed to send recovery link.');
    }
  });

  resendRecoveryBtn.addEventListener('click', async function() {
    clearMessages();
    if (!resetEmail) {
      showError('Please enter your email first.');
      showStep('email');
      return;
    }
    try {
      const redirectTo = new URL('reset-password.html', window.location.href).href;
      const { error } = await supabaseClient.auth.resetPasswordForEmail(resetEmail, { redirectTo: redirectTo });
      if (error) throw error;
      showSuccess('A new recovery link has been sent.');
    } catch (error) {
      showError(error?.message || 'Failed to resend recovery link.');
    }
  });

  passwordStepForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearMessages();
    if (!recoverySessionReady) {
      showError('Open this page from your recovery email link first.');
      return;
    }

    const newPassword = document.getElementById('newPassword').value;
    const confirmNewPassword = document.getElementById('confirmNewPassword').value;
    if (newPassword !== confirmNewPassword) { showError('Passwords do not match.'); return; }
    if (newPassword.length < 6) { showError('Password must be at least 6 characters long.'); return; }

    try {
      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
      if (error) throw error;
      showSuccess('Password updated successfully. Redirecting to login...');
      setTimeout(async function() {
        await supabaseClient.auth.signOut();
        window.location.href = 'login.html';
      }, 1200);
    } catch (error) {
      showError(error?.message || 'Failed to update password.');
    }
  });

  (async function initializeRecoveryFlow() {
    if (!hasRecoveryParams()) {
      showStep('email');
      return;
    }

    try {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) throw error;
      if (!data?.session) {
        showStep('email');
        showError('Recovery link is invalid or expired. Please request a new one.');
        return;
      }

      recoverySessionReady = true;
      resetEmail = data.session.user?.email || '';
      showStep('password');
      showSuccess('Recovery verified. Enter your new password.');
      window.history.replaceState({}, document.title, 'reset-password.html');
    } catch (error) {
      showStep('email');
      showError(error?.message || 'Failed to process recovery link.');
    }
  })();
});
</script>
</body>
</html>
